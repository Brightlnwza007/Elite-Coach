<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Elite Coach</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 800px;
    }

    h1 {
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      color: #aaa;
      margin-bottom: 40px;
    }

    .btn {
      padding: 15px 30px;
      background: white;
      color: black;
      border: none;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ddd;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Become the version of you nobody can ignore.</h1>
    <p>Discipline. Focus. Power. This is where transformation starts.</p>
    <button class="btn">Get Started</button>
  </div>
</body>
</html>
