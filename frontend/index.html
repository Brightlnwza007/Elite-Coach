<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Elite Coach</title>

  <!-- ฟอนต์หรู -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #0a0a0a;
      color: white;
      font-family: 'Inter', sans-serif;
    }

    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 64px;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.7;
      margin-bottom: 30px;
    }

    .btn {
      padding: 12px 28px;
      border: 1px solid white;
      text-decoration: none;
      color: white;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: black;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>ELITE COACH</h1>
    <p>Discipline. Power. Control.</p>
    <a href="#" class="btn">ENTER</a>
  </div>
</body>
</html>
